name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # The Khronos OpenCL SDK provides the headers and the import lib
      # (OpenCL.lib) that links against the driver at runtime — no GPU needed
      # on the build machine.
      - name: Install OpenCL SDK (Khronos)
        run: |
          choco install opencl-sdk -y --no-progress
        shell: pwsh

      # libjpeg-turbo official installer ships static libs + headers.
      - name: Install libjpeg-turbo
        run: |
          $url = "https://github.com/libjpeg-turbo/libjpeg-turbo/releases/download/3.0.3/libjpeg-turbo-3.0.3-vc64.exe"
          Invoke-WebRequest $url -OutFile libjpeg-turbo-installer.exe
          Start-Process -FilePath libjpeg-turbo-installer.exe -ArgumentList "/S" -Wait
        shell: pwsh

      # Tell cgo where to find OpenCL and libjpeg-turbo headers + libs.
      # The Khronos choco package installs to C:\OCL_SDK_Light.
      # libjpeg-turbo installs to C:\libjpeg-turbo64.
      - name: Configure cgo paths
        run: |
          echo "CGO_CFLAGS=-I`"C:\OCL_SDK_Light\include`" -I`"C:\libjpeg-turbo64\include`"" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L`"C:\OCL_SDK_Light\lib\x86_64`" -L`"C:\libjpeg-turbo64\lib`" -lOpenCL -lturbojpeg-static" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build
        run: wails build -platform windows/amd64 -o gpu-resize.exe
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-resize-windows
          path: build/bin/gpu-resize.exe
          if-no-files-found: error
