name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        shell: pwsh

      - name: Set up MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # path-type: inherit makes MSYS2 inherit the Windows PATH (translated to
          # Unix paths), so the actions-installed Go and the Wails binary installed
          # by the previous step are visible inside the msys2 shell.
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-opencl-icd
            mingw-w64-x86_64-opencl-headers
            mingw-w64-x86_64-libjpeg-turbo

      # The MSYS2 mingw-w64-x86_64-* packages install into C:/msys64/mingw64/,
      # which is already on the MinGW gcc search path.  We only need to set
      # CGO_CFLAGS so that the cgo preamble's #include <CL/cl.h> and
      # #include <turbojpeg.h> are found.
      - name: Configure cgo paths and build
        run: |
          export CGO_CFLAGS="-I/mingw64/include"
          export CGO_LDFLAGS="-L/mingw64/lib -lOpenCL -lturbojpeg"
          export PATH="/mingw64/bin:$PATH"
          wails build -platform windows/amd64 -o gpu-resize.exe

      # Copy all MinGW runtime DLLs that gpu-resize.exe depends on into build/bin/
      # so the artifact is self-contained and runs on machines without MSYS2.
      # `ldd` lists all DLL dependencies; we copy only those that live under
      # /mingw64/bin (i.e. MinGW-provided — not Windows system DLLs).
      - name: Bundle runtime DLLs
        run: |
          ldd build/bin/gpu-resize.exe \
            | grep '/mingw64/bin/' \
            | sed 's|.* => \(/mingw64/bin/[^ ]*\).*|\1|' \
            | xargs -I{} cp {} build/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-resize-windows
          path: build/bin/
          if-no-files-found: error

  # Debug build: same as above but compiled with -tags debugui so that
  # WebView2 DevTools open automatically on startup.  Download this artifact
  # when you need to inspect JS console output or event delivery on Windows.
  build-windows-debug:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        shell: pwsh

      - name: Set up MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-opencl-icd
            mingw-w64-x86_64-opencl-headers
            mingw-w64-x86_64-libjpeg-turbo

      - name: Configure cgo paths and build (debug)
        run: |
          export CGO_CFLAGS="-I/mingw64/include"
          export CGO_LDFLAGS="-L/mingw64/lib -lOpenCL -lturbojpeg"
          export PATH="/mingw64/bin:$PATH"
          wails build -platform windows/amd64 -tags debugui -o gpu-resize-debug.exe

      - name: Bundle runtime DLLs
        run: |
          ldd build/bin/gpu-resize-debug.exe \
            | grep '/mingw64/bin/' \
            | sed 's|.* => \(/mingw64/bin/[^ ]*\).*|\1|' \
            | xargs -I{} cp {} build/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-resize-windows-debug
          path: build/bin/
          if-no-files-found: error
