name: Build Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-opencl-icd
            mingw-w64-x86_64-opencl-headers
            mingw-w64-x86_64-libjpeg-turbo

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
        env:
          # Make sure the MSYS2 Go shim is not used; we want the actions-installed Go.
          MSYSTEM: MINGW64

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        shell: pwsh

      # The MSYS2 mingw-w64-x86_64-* packages install into C:/msys64/mingw64/,
      # which is already on the MinGW gcc search path.  We only need to set
      # CGO_CFLAGS so that the cgo preamble's #include <CL/cl.h> and
      # #include <turbojpeg.h> are found.
      - name: Configure cgo paths and build
        run: |
          export CGO_CFLAGS="-I/mingw64/include"
          export CGO_LDFLAGS="-L/mingw64/lib -lOpenCL -lturbojpeg"
          export PATH="/mingw64/bin:$PATH"
          wails build -platform windows/amd64 -o gpu-resize.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-resize-windows
          path: build/bin/gpu-resize.exe
          if-no-files-found: error
