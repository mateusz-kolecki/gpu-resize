name: Test macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # macOS ships OpenCL.framework but it implements only OpenCL 1.2 and
      # doesn't export clCloneKernel (2.1) or clCreateCommandQueueWithProperties (2.0).
      # opencl-icd-loader is the Khronos ICD loader with full OpenCL 3.0 API surface.
      # opencl-headers provides the matching Khronos 2.1+ header files.
      # pocl provides a CPU device so the GPU code path is exercised in CI.
      # jpeg-turbo is the Homebrew formula for libjpeg-turbo.
      - name: Install dependencies
        run: |
          brew install opencl-icd-loader opencl-headers pocl jpeg-turbo

      # Homebrew installs to /opt/homebrew on Apple Silicon, /usr/local on Intel.
      # Link against the Khronos ICD loader (not -framework OpenCL) so that the
      # full OpenCL 2.x symbol set is available at link time.
      - name: Set CGO paths
        run: |
          PREFIX=$(brew --prefix)
          OCL_HEADERS=$(brew --prefix opencl-headers)
          OCL_LOADER=$(brew --prefix opencl-icd-loader)
          echo "CGO_CFLAGS=-I${OCL_HEADERS}/include -I${PREFIX}/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L${OCL_LOADER}/lib -lOpenCL -L${PREFIX}/lib -lturbojpeg" >> "$GITHUB_ENV"
          # pocl installs its ICD file under the brew prefix; tell the OpenCL
          # loader where to find it.
          echo "OCL_ICD_VENDORS=${PREFIX}/etc/OpenCL/vendors" >> "$GITHUB_ENV"

      - name: Verify OpenCL CPU device is visible
        run: |
          brew install clinfo || true
          clinfo --list || true   # non-fatal: macOS may expose its own GPU

      - name: Build (no Wails / no UI)
        run: go build ./internal/... ./pkg/...

      - name: Test with race detector
        run: go test -race -v -count=1 ./internal/... ./pkg/...
