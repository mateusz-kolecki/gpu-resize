name: Test Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    env:
      # Intel CPU OpenCL runtime (oclcpuexp) and its TBB dependency.
      # Using the same versions as intel/llvm devops/dependencies.json.
      INTEL_OCL_URL: https://github.com/intel/llvm/releases/download/2025-WW45/win-oclcpuexp-2025.21.10.0.10_160000_rel.zip
      INTEL_TBB_URL: https://github.com/uxlfoundation/oneTBB/releases/download/v2022.3.0/oneapi-tbb-2022.3.0-win.zip
      INTEL_PREFIX: C:\Tools\Intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # path-type: inherit makes MSYS2 inherit the Windows PATH (translated to
          # Unix paths), so the actions-installed Go is visible inside the msys2 shell.
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-opencl-icd
            mingw-w64-x86_64-opencl-headers
            mingw-w64-x86_64-libjpeg-turbo

      # Install Intel CPU OpenCL runtime so the GPU code path is exercised in CI.
      # The runtime registers itself via the Khronos ICD registry key so that
      # the MSYS2-installed OpenCL ICD loader (opencl.dll) can find it.
      # Technique adapted from KhronosGroup/OpenCL-SDK CI workflow.
      - name: Install Intel CPU OpenCL runtime (oclcpuexp)
        shell: pwsh
        run: |
          $INTEL_PREFIX = $env:INTEL_PREFIX

          # Download and extract oclcpuexp
          Invoke-WebRequest $env:INTEL_OCL_URL -OutFile "$env:TEMP\oclcpuexp.zip"
          Expand-Archive "$env:TEMP\oclcpuexp.zip" -DestinationPath "$INTEL_PREFIX\oclcpuexp"
          Remove-Item "$env:TEMP\oclcpuexp.zip"

          # Download and extract TBB (required by oclcpuexp)
          Invoke-WebRequest $env:INTEL_TBB_URL -OutFile "$env:TEMP\oneapi-tbb.zip"
          Expand-Archive "$env:TEMP\oneapi-tbb.zip" -DestinationPath $INTEL_PREFIX
          Get-ChildItem "$INTEL_PREFIX\oneapi-tbb*" | Rename-Item -NewName oneapi-tbb
          Remove-Item "$env:TEMP\oneapi-tbb.zip"

          # Symlink TBB DLLs into oclcpuexp so it can load them at runtime
          New-Item -Type Directory "$INTEL_PREFIX\oclcpuexp\tbb" | Out-Null
          Get-ChildItem "$INTEL_PREFIX\oneapi-tbb\redist\intel64\vc14\*.dll" | ForEach-Object {
            New-Item -Type SymbolicLink `
              -Path "$INTEL_PREFIX\oclcpuexp\tbb" `
              -Name $_.Name `
              -Value $_.FullName | Out-Null
          }

          # Register oclcpuexp with the Khronos ICD loader via registry
          New-Item -Type Directory HKLM:\SOFTWARE\Khronos\OpenCL -Force | Out-Null
          New-Item -Type File HKLM:\SOFTWARE\Khronos\OpenCL\Vendors -Force | Out-Null
          Set-ItemProperty `
            -Path HKLM:\SOFTWARE\Khronos\OpenCL\Vendors `
            -Name "$INTEL_PREFIX\oclcpuexp\intelocl64.dll" `
            -Type DWord -Value 0

          # Add oclcpuexp and TBB directories to PATH so the DLLs are found at runtime
          "$INTEL_PREFIX\oclcpuexp" | Out-File $env:GITHUB_PATH -Append
          "$INTEL_PREFIX\oclcpuexp\tbb" | Out-File $env:GITHUB_PATH -Append

      - name: Verify OpenCL CPU device is visible
        shell: pwsh
        run: |
          # clinfo is available from the MSYS2 MINGW64 environment
          & C:\msys64\mingw64\bin\clinfo.exe --list
        continue-on-error: true

      - name: Build (no Wails / no UI)
        shell: msys2 {0}
        run: |
          export CGO_CFLAGS="-I/mingw64/include"
          export CGO_LDFLAGS="-L/mingw64/lib -lOpenCL -lturbojpeg"
          export PATH="/mingw64/bin:$PATH"
          go build ./internal/... ./pkg/...

      - name: Test with race detector
        shell: msys2 {0}
        run: |
          export CGO_CFLAGS="-I/mingw64/include"
          export CGO_LDFLAGS="-L/mingw64/lib -lOpenCL -lturbojpeg"
          export PATH="/mingw64/bin:$PATH"
          go test -race -v -count=1 ./internal/... ./pkg/...
