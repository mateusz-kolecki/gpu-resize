name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── Linux ─────────────────────────────────────────────────────────────────
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # pocl-opencl-icd provides a CPU OpenCL device via LLVM so the GPU code
      # path (opencl.Context, clCloneKernel, kernels) is exercised in CI even
      # without a physical GPU.
      - name: Install OpenCL and libjpeg-turbo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ocl-icd-opencl-dev opencl-headers \
            pocl-opencl-icd clinfo \
            libturbojpeg0-dev

      - name: Verify OpenCL CPU device
        run: clinfo --list

      - name: Test
        run: go test -race -v -count=1 ./internal/... ./pkg/...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (Linux)
        run: wails build -tags webkit2_41 -platform linux/amd64 -o gpu-resize

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-resize-linux
          path: build/bin/gpu-resize
          if-no-files-found: error

  # ── macOS ──────────────────────────────────────────────────────────────────
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # opencl-icd-loader: Khronos ICD loader with full OpenCL 3.0 API surface.
      # opencl-headers: matching 2.1+ headers.
      # pocl: CPU device so the GPU code path is exercised.
      # jpeg-turbo: libjpeg-turbo.
      - name: Install dependencies
        run: brew install opencl-icd-loader opencl-headers pocl jpeg-turbo

      - name: Set CGO paths
        run: |
          PREFIX=$(brew --prefix)
          OCL_HEADERS=$(brew --prefix opencl-headers)
          OCL_LOADER=$(brew --prefix opencl-icd-loader)
          echo "CGO_CFLAGS=-I${OCL_HEADERS}/include -I${PREFIX}/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L${OCL_LOADER}/lib -lOpenCL -L${PREFIX}/lib -lturbojpeg" >> "$GITHUB_ENV"
          echo "OCL_ICD_VENDORS=${PREFIX}/etc/OpenCL/vendors" >> "$GITHUB_ENV"

      - name: Verify OpenCL CPU device
        run: brew install clinfo || true; clinfo --list || true

      - name: Test
        run: go test -race -v -count=1 ./internal/... ./pkg/...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (macOS)
        run: wails build -platform darwin/amd64 -o gpu-resize

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-resize-macos
          path: build/bin/gpu-resize
          if-no-files-found: error

  # ── Windows ────────────────────────────────────────────────────────────────
  test-windows:
    name: Test + Build (Windows)
    runs-on: windows-latest

    env:
      INTEL_OCL_URL: https://github.com/intel/llvm/releases/download/2025-WW45/win-oclcpuexp-2025.21.10.0.10_160000_rel.zip
      INTEL_TBB_URL: https://github.com/uxlfoundation/oneTBB/releases/download/v2022.3.0/oneapi-tbb-2022.3.0-win.zip
      INTEL_PREFIX: C:\Tools\Intel

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Set up MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-opencl-icd
            mingw-w64-x86_64-opencl-headers
            mingw-w64-x86_64-libjpeg-turbo

      - name: Install Intel CPU OpenCL runtime (oclcpuexp)
        shell: pwsh
        run: |
          $INTEL_PREFIX = $env:INTEL_PREFIX
          Invoke-WebRequest $env:INTEL_OCL_URL -OutFile "$env:TEMP\oclcpuexp.zip"
          Expand-Archive "$env:TEMP\oclcpuexp.zip" -DestinationPath "$INTEL_PREFIX\oclcpuexp"
          Remove-Item "$env:TEMP\oclcpuexp.zip"
          Invoke-WebRequest $env:INTEL_TBB_URL -OutFile "$env:TEMP\oneapi-tbb.zip"
          Expand-Archive "$env:TEMP\oneapi-tbb.zip" -DestinationPath $INTEL_PREFIX
          Get-ChildItem "$INTEL_PREFIX\oneapi-tbb*" | Rename-Item -NewName oneapi-tbb
          Remove-Item "$env:TEMP\oneapi-tbb.zip"
          New-Item -Type Directory "$INTEL_PREFIX\oclcpuexp\tbb" | Out-Null
          Get-ChildItem "$INTEL_PREFIX\oneapi-tbb\redist\intel64\vc14\*.dll" | ForEach-Object {
            New-Item -Type SymbolicLink `
              -Path "$INTEL_PREFIX\oclcpuexp\tbb" `
              -Name $_.Name -Value $_.FullName | Out-Null
          }
          New-Item -Type Directory HKLM:\SOFTWARE\Khronos\OpenCL -Force | Out-Null
          New-Item -Type File HKLM:\SOFTWARE\Khronos\OpenCL\Vendors -Force | Out-Null
          Set-ItemProperty `
            -Path HKLM:\SOFTWARE\Khronos\OpenCL\Vendors `
            -Name "$INTEL_PREFIX\oclcpuexp\intelocl64.dll" `
            -Type DWord -Value 0
          "$INTEL_PREFIX\oclcpuexp" | Out-File $env:GITHUB_PATH -Append
          "$INTEL_PREFIX\oclcpuexp\tbb" | Out-File $env:GITHUB_PATH -Append

      - name: Verify OpenCL CPU device
        shell: pwsh
        run: '& C:\msys64\mingw64\bin\clinfo.exe --list'
        continue-on-error: true

      - name: Test
        run: |
          export CGO_CFLAGS="-I/mingw64/include"
          export CGO_LDFLAGS="-L/mingw64/lib -lOpenCL -lturbojpeg"
          export PATH="/mingw64/bin:$PATH"
          go test -race -v -count=1 ./internal/... ./pkg/...

      - name: Build (Windows)
        run: |
          export CGO_CFLAGS="-I/mingw64/include"
          export CGO_LDFLAGS="-L/mingw64/lib -lOpenCL -lturbojpeg"
          export PATH="/mingw64/bin:$PATH"
          wails build -platform windows/amd64 -o gpu-resize.exe

      - name: Bundle runtime DLLs
        run: |
          ldd build/bin/gpu-resize.exe \
            | grep '/mingw64/bin/' \
            | sed 's|.* => \(/mingw64/bin/[^ ]*\).*|\1|' \
            | xargs -I{} cp {} build/bin/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-resize-windows
          path: build/bin/
          if-no-files-found: error
